# =============================================================================
# MCP GHCR Build — Build Docker image and push to GitHub Container Registry
# =============================================================================
#
# Triggered on push to main or dev, and on manual dispatch.
# - main: pushes :latest and :sha-XXXXXXX tags
# - dev:  pushes :dev and :sha-XXXXXXX tags
#
# Watchtower on the Hetzner prod server polls GHCR every 6 hours and
# automatically restarts containers when a new :latest image is detected.
# No manual deploy step needed.
#
# DATABASE PROVISIONING:
# Handles three scenarios for getting data into the Docker image:
#   1. Dockerfile COPYs a .db file that's in the repo (normal case — no action)
#   2. Dockerfile COPYs a .db file but it's LFS/gitignored — downloads from release
#   3. Dockerfile has NO COPY data/ (sector MCPs) — downloads from release and
#      patches the Dockerfile to inject the COPY + update the DB_PATH env var
#
# PREREQUISITES:
# 1. Repository must have a Dockerfile at the root (or specify path)
# 2. GITHUB_TOKEN has automatic write:packages permission (no secrets needed)
# 3. For repos with gitignored/LFS/missing databases: a GitHub Release with database.db.gz
#
# =============================================================================

name: Build and Push to GHCR

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: uk-vet-medicines-mcp

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Provision database
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # --- Case 1 & 2: Dockerfile COPYs a .db file ---
          DB_FILES=$(grep -oP 'COPY\s+\K(data/\S+\.db)' Dockerfile 2>/dev/null || true)
          if [ -n "$DB_FILES" ]; then
            for DB_FILE in $DB_FILES; do
              if [ -f "$DB_FILE" ] && [ "$(wc -c < "$DB_FILE")" -gt 1024 ]; then
                echo "OK: $DB_FILE is valid ($(du -sh "$DB_FILE" | cut -f1))"
                continue
              fi

              # Detect LFS pointer or empty file
              if [ -f "$DB_FILE" ]; then
                if head -1 "$DB_FILE" 2>/dev/null | grep -q 'version https://git-lfs'; then
                  echo "WARN: $DB_FILE is an LFS pointer, not actual data"
                else
                  echo "WARN: $DB_FILE exists but is empty or too small ($(wc -c < "$DB_FILE") bytes)"
                fi
              else
                echo "WARN: $DB_FILE does not exist"
              fi

              # Download from GitHub Releases
              TAG=$(gh release view --json tagName -q '.tagName' 2>/dev/null) || true
              if [ -z "$TAG" ]; then
                echo "ERROR: $DB_FILE invalid and no GitHub Release available"
                exit 1
              fi

              echo "Downloading database.db.gz from release $TAG..."
              mkdir -p data
              if gh release download "$TAG" -p "database.db.gz" -D data/ 2>/dev/null; then
                gunzip -f data/database.db.gz
                echo "OK: Downloaded $(du -sh data/database.db | cut -f1) from release $TAG"
              else
                echo "ERROR: Could not download database.db.gz from release $TAG"
                exit 1
              fi
            done
            exit 0
          fi

          # --- Case 3: Dockerfile has NO COPY data/ (sector MCPs) ---
          # Check if a GitHub Release has a database asset
          TAG=$(gh release view --json tagName -q '.tagName' 2>/dev/null) || true
          if [ -z "$TAG" ]; then
            echo "No .db COPY in Dockerfile and no release — nothing to provision"
            exit 0
          fi

          echo "No .db COPY in Dockerfile but release $TAG exists — downloading and patching..."
          mkdir -p data
          if ! gh release download "$TAG" -p "database.db.gz" -D data/ 2>/dev/null; then
            echo "No database.db.gz asset in release — skipping"
            exit 0
          fi
          gunzip -f data/database.db.gz
          echo "Downloaded $(du -sh data/database.db | cut -f1) from release $TAG"

          # Patch the Dockerfile: inject COPY data/ before USER line
          if grep -q '^USER' Dockerfile; then
            sed -i '/^USER/i \
          # Injected by CI: copy database from release asset\
          COPY data/database.db ./data/database.db' Dockerfile
          else
            echo 'COPY data/database.db ./data/database.db' >> Dockerfile
          fi

          # Update the *_DB_PATH env var to point to database.db
          DB_ENV=$(grep -oP 'ENV\s+\K\w+_DB_PATH' Dockerfile | head -1 || true)
          if [ -n "$DB_ENV" ]; then
            sed -i "s|${DB_ENV}=.*|${DB_ENV}=/app/data/database.db|" Dockerfile
            echo "Updated $DB_ENV to /app/data/database.db"
          fi

          echo "Dockerfile patched for data injection"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/ansvar-systems/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        if: always()
        run: |
          echo "## GHCR Build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${{ env.REGISTRY }}/ansvar-systems/${{ env.IMAGE_NAME }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tags | $(echo '${{ steps.meta.outputs.tags }}' | tr '\n' ', ') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"